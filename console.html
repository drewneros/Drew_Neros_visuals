<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#F4F1EA;--fg:#111110;--fg-soft:#6B6863;--fg-faint:#A8A39A;
    --line:rgba(17,17,16,.06);--line-strong:rgba(17,17,16,.14);
    --film-red:oklch(0.58 0.10 28);--film-ochre:oklch(0.74 0.08 75);
    --film-teal:oklch(0.55 0.05 205);--film-olive:oklch(0.62 0.05 110);
    --serif:"DM Sans",Helvetica,Arial,sans-serif;
    --sans:"DM Sans",Helvetica,Arial,sans-serif;
    --mono:"Geist Mono",ui-monospace,Menlo,monospace;
    --grain-opacity:.045;
  }
  html[data-theme="dark"]{
    --bg:#0E0E0C;--fg:#EDEAE2;--fg-soft:#9A958B;--fg-faint:#605C55;
    --line:rgba(237,234,226,.06);--line-strong:rgba(237,234,226,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:var(--sans);font-weight:400;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  img{display:block;max-width:100%}
  .meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-soft)}
  .display{font-family:var(--sans);font-weight:500;letter-spacing:-0.035em;line-height:.92}
  .italic{font-style:italic;font-weight:400}
  @keyframes blink{50%{opacity:.25}}
  .blink{animation:blink 1.4s steps(2) infinite}
  .ph{position:relative;background:repeating-linear-gradient(135deg,rgba(0,0,0,.05) 0 1px,transparent 1px 9px),linear-gradient(180deg,#d8d3c7 0%,#b9b2a3 100%);color:#3a352d;overflow:hidden;isolation:isolate}
  html[data-theme="dark"] .ph{background:repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0 1px,transparent 1px 9px),linear-gradient(180deg,#2a2723 0%,#1a1816 100%);color:#a6a098}
  .ph .ph-label{position:absolute;inset:auto 10px 10px 10px;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:inherit;opacity:.85}
  .ph .ph-mark{position:absolute;top:10px;left:10px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:inherit;opacity:.7}
  .ph .ph-frame{position:absolute;inset:6px;border:1px solid rgba(0,0,0,.18)}
  html[data-theme="dark"] .ph .ph-frame{border-color:rgba(255,255,255,.10)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;height:44px;padding:0 20px;border-radius:999px;background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:13px;letter-spacing:.02em;font-weight:500;line-height:1;white-space:nowrap;transition:transform .25s ease,background .25s ease,opacity .25s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--fg);border:1px solid var(--line-strong)}
  .btn:disabled,.btn[disabled]{opacity:.4;cursor:default;pointer-events:none;transform:none}
  @media(max-width:760px){.admin-2col{grid-template-columns:1fr!important;gap:32px!important}.admin-buckets{grid-template-columns:1fr!important}.progress-pill{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/placeholder.jsx"></script>
<script type="text/babel" src="src/gallery.jsx"></script>

  root.render(
    <AdminFlow onClose={() => { window.location.href = "/"; }} />
  );
</script>
</body>
</html>
